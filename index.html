    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1A233E; --orange: #E8820C; }
        body { font-family: 'Inter', sans-serif; background-color: #FDFCFB; color: var(--navy); }
        h1, h2, h3 { font-family: 'DM+Serif+Display', serif; }

        /* Drop-down Animation Logic */
        .drop-down { 
            opacity: 0; 
            transform: translateY(-20px); 
            animation: dropIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
        }
        @keyframes dropIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered delays for the cards */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        .navy-card {
            background-color: var(--navy);
            border-radius: 2.5rem;
            transition: all 0.3s ease;
        }
        .navy-card:hover {
            transform: scale(1.01);
            background-color: #242f4d;
        }
        
        .lang-active { background-color: var(--navy); color: white; }
    </style>
</head>

    <script>
        const translations = {
            en: {
                subtitle: "Let's connect and build bridges together.",
                status: "Student",
                personal: "Personal Email",
                work: "Work Email"
            },
            id: {
                subtitle: "Mari terhubung dan bangun jembatan bersama.",
                status: "Mahasiswa",
                personal: "Email Pribadi",
                work: "Email Pekerjaan"
            }
        };

        function toggleLang(lang) {
            document.getElementById('subtitle').innerText = translations[lang].subtitle;
            document.getElementById('status-text').innerText = translations[lang].status;
            document.getElementById('label-personal').innerText = translations[lang].personal;
            document.getElementById('label-work').innerText = translations[lang].work;

            const enBtn = document.getElementById('en-btn');
            const idBtn = document.getElementById('id-btn');

            if (lang === 'en') {
                enBtn.classList.add('lang-active');
                enBtn.classList.remove('text-slate-400');
                idBtn.classList.remove('lang-active');
                idBtn.classList.add('text-slate-400');
            } else {
                idBtn.classList.add('lang-active');
                idBtn.classList.remove('text-slate-400');
                enBtn.classList.remove('lang-active');
                enBtn.classList.add('text-slate-400');
            }
        }
    </script>
